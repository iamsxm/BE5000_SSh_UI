name: build-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: BE5000_SSh
  TARGET_OS: windows
  TARGET_ARCH: amd64

jobs:
  package-windows:
    name: Package Windows amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 zip xorg-dev
          go install fyne.io/fyne/v2/cmd/fyne@v2.5.2

      - name: Run static checks
        run: |
          test -z "$(gofmt -l .)"
          go test -tags ci ./...

      - name: Package application
        env:
          CGO_ENABLED: "1"
          CC: x86_64-w64-mingw32-gcc
        run: |
          rm -rf build
          mkdir -p build/bin build/release
          fyne package -os "${TARGET_OS}" -icon xiaomi_icon.png -name "${APP_NAME}"
          mv "${APP_NAME}.exe" build/bin/
          cp dropbear dropbearkey LICENSE README.md build/bin/
          cd build/bin
          zip -r "../release/${APP_NAME}_${TARGET_OS}_${TARGET_ARCH}.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_${{ env.TARGET_OS }}_${{ env.TARGET_ARCH }}
          path: build/release/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: build/release/*.zip
          generate_release_notes: true
          make_latest: true
